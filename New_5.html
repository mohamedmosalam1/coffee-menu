<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#121212">
<title>MO Cafe</title>

<style>
:root {
  --main: #c89b3c;
  --bg: #121212;
  --card: rgba(255,255,255,0.05);
  --text: #fff;
}

.light {
  --bg: #f7f7f7;
  --card: #fff;
  --text: #000;
}

body {
  margin: 0;
  font-family: 'Segoe UI';
  background: var(--bg);
  color: var(--text);
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.topbar {
  display: flex;
  gap: 10px;
  padding: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: none;
  outline: none;
}

.btn {
  border: none;
  border-radius: 50%;
  padding: 10px;
  cursor: pointer;
  background: var(--card);
  color: var(--text);
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.tabs button {
  padding: 8px 18px;
  border-radius: 20px;
  background: #333;
  color: #aaa;
  border: none;
  cursor: pointer;
}

.tabs .active {
  background: var(--main);
  color: #000;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 12px;
}

.card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background: var(--card);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.thumb {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.card video {
  position: absolute;
  top: 0;
  left: 0;
  height: 140px;
  width: 100%;
  object-fit: cover;
  opacity: 0;
  transition: 0.3s;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 60%;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

.content {
  position: absolute;
  bottom: 0;
  padding: 10px;
  width: 100%;
}

.name {
  font-weight: bold;
  font-size: 14px;
}

.desc {
  font-size: 11px;
  color: #ccc;
}

.price {
  position: absolute;
  top: 10px;
  left: 10px;
  background: linear-gradient(45deg,#c89b3c,#f5d27a);
  color: #000;
  padding: 5px 10px;
  border-radius: 15px;
  font-size: 12px;
  font-weight: bold;
}

.heart {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 18px;
  cursor: pointer;
  z-index: 2;
}

.stars {
  font-size: 11px;
  color: gold;
}

.empty {
  text-align: center;
  margin-top: 40px;
  opacity: 0.6;
}

/* 🔥 Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal-box {
  width: 90%;
  max-width: 400px;
  background: var(--bg);
  border-radius: 20px;
  overflow: hidden;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(50px); opacity:0; }
  to { transform: translateY(0); opacity:1; }
}

.modal video {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.modal-content {
  padding: 15px;
}

.modal-price {
  font-weight: bold;
  margin-top: 10px;
  color: var(--main);
}

.close {
  position: absolute;
  right: 20px;
  top: 15px;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">☕ MO Cafe</div>

<div class="topbar">
  <input id="search" placeholder="Search...">
  <button class="btn" onclick="toggleTheme()">🌙</button>
  <button class="btn" onclick="toggleLang()">🌐</button>
</div>

<div class="tabs">
  <button class="tab active" data-type="hot" id="hotTab">Hot</button>
  <button class="tab" data-type="cold" id="coldTab">Cold</button>
</div>

<div id="menu" class="grid"></div>

<!-- 🔥 Modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✖</span>
    <video id="modalVideo" controls muted></video>
    <div class="modal-content">
      <h3 id="modalName"></h3>
      <p id="modalDesc"></p>
      <div class="modal-price" id="modalPrice"></div>
    </div>
  </div>
</div>

<script>
let favorites = JSON.parse(localStorage.getItem("fav")) || { hot:[], cold:[] };
let current = "hot";
let lang = localStorage.getItem("lang") || "en";
let theme = localStorage.getItem("theme") || "dark";

if(theme === "light") document.body.classList.add("light");

const data = { /* نفس الداتا زي ما هي */ 
  hot: [
    { name_ar:"شاي", name_en:"Tea", desc_ar:"شاي ساخن", desc_en:"Hot Tea", price:15, rate:4, video:"https://samplelib.com/lib/preview/mp4/sample-5s.mp4"},
    { name_ar:"قهوة تركي", name_en:"Turkish Coffee", desc_ar:"قهوة تقيلة", desc_en:"Strong Coffee", price:20, rate:5, video:"https://filesamples.com/samples/video/mp4/sample_640x360.mp4"},
    { name_ar:"اسبريسو", name_en:"Espresso", desc_ar:"قهوة قوية", desc_en:"Strong Shot", price:25, rate:4, video:"https://samplelib.com/lib/preview/mp4/sample-10s.mp4"},
    { name_ar:"كابتشينو", name_en:"Cappuccino", desc_ar:"قهوة بلبن", desc_en:"With Milk", price:30, rate:5, video:"https://filesamples.com/samples/video/mp4/sample_960x400_ocean_with_audio.mp4"},
    { name_ar:"لاتيه", name_en:"Latte", desc_ar:"لبن كتير", desc_en:"Milky Coffee", price:32, rate:4, video:"https://samplelib.com/lib/preview/mp4/sample-5s.mp4"},
    { name_ar:"موكا", name_en:"Mocha", desc_ar:"قهوة بالشوكولاتة", desc_en:"Chocolate Coffee", price:35, rate:5, video:"https://filesamples.com/samples/video/mp4/sample_640x360.mp4"},
    { name_ar:"نسكافيه", name_en:"Nescafe", desc_ar:"سريع التحضير", desc_en:"Instant Coffee", price:20, rate:3, video:"https://samplelib.com/lib/preview/mp4/sample-10s.mp4"},
    { name_ar:"هوت شوكليت", name_en:"Hot Chocolate", desc_ar:"شوكولاتة ساخنة", desc_en:"Hot Choco", price:28, rate:5, video:"https://filesamples.com/samples/video/mp4/sample_960x400_ocean_with_audio.mp4"},
    { name_ar:"شاي أخضر", name_en:"Green Tea", desc_ar:"صحي", desc_en:"Healthy Tea", price:18, rate:4, video:"https://samplelib.com/lib/preview/mp4/sample-5s.mp4"}
  ],
  cold: [
    { name_ar:"عصير برتقال", name_en:"Orange Juice", desc_ar:"فريش", desc_en:"Fresh", price:25, rate:4, video:"https://samplelib.com/lib/preview/mp4/sample-5mb.mp4"},
    { name_ar:"عصير مانجا", name_en:"Mango Juice", desc_ar:"طبيعي", desc_en:"Natural", price:30, rate:5, video:"https://filesamples.com/samples/video/mp4/sample_640x360.mp4"},
    { name_ar:"عصير فراولة", name_en:"Strawberry Juice", desc_ar:"منعش", desc_en:"Refreshing", price:28, rate:4, video:"https://samplelib.com/lib/preview/mp4/sample-10s.mp4"},
    { name_ar:"ليمون بالنعناع", name_en:"Lemon Mint", desc_ar:"منعش", desc_en:"Fresh Drink", price:27, rate:5, video:"https://samplelib.com/lib/preview/mp4/sample-5mb.mp4"},
    { name_ar:"آيس كوفي", name_en:"Iced Coffee", desc_ar:"قهوة باردة", desc_en:"Cold Coffee", price:30, rate:4, video:"https://filesamples.com/samples/video/mp4/sample_640x360.mp4"},
    { name_ar:"آيس لاتيه", name_en:"Iced Latte", desc_ar:"لبن بارد", desc_en:"Cold Milk Coffee", price:32, rate:5, video:"https://samplelib.com/lib/preview/mp4/sample-10s.mp4"},
    { name_ar:"ميلك شيك", name_en:"Milkshake", desc_ar:"لبن مخفوق", desc_en:"Sweet Shake", price:35, rate:5, video:"https://filesamples.com/samples/video/mp4/sample_960x400_ocean_with_audio.mp4"},
    { name_ar:"سموزي", name_en:"Smoothie", desc_ar:"فواكه", desc_en:"Fruit Mix", price:33, rate:4, video:"https://samplelib.com/lib/preview/mp4/sample-5mb.mp4"}
  ]
};

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const v = entry.target;
      if(!v.src){
        v.src = v.dataset.src;
      }
      v.style.opacity = 1;
      v.play();
    }
  });
});

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  let count = 0;

  data[current].forEach((item, i) => {
    const name = lang === "ar" ? item.name_ar : item.name_en;
    const desc = lang === "ar" ? item.desc_ar : item.desc_en;

    if(!name.toLowerCase().includes(search)) return;

    count++;

    const fav = favorites[current].includes(i);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="heart">${fav ? "❤️":"🤍"}</div>
      <div class="price">EGP ${item.price}</div>
      <img class="thumb" src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
      <video data-src="${item.video}" muted loop playsinline></video>
      <div class="overlay"></div>
      <div class="content">
        <div class="name">${name}</div>
        <div class="desc">${desc}</div>
        <div class="stars">${"⭐".repeat(item.rate)}</div>
      </div>
    `;

    const vid = card.querySelector("video");
    observer.observe(vid);

    card.onmouseenter = () => vid.play();
    card.onmouseleave = () => vid.pause();

    card.onclick = () => openModal(item);

    card.querySelector(".heart").onclick = (e) => {
      e.stopPropagation();
      toggleFav(i);
    };

    menu.appendChild(card);
  });

  if(count === 0){
    menu.innerHTML = `<div class="empty">${lang==="ar"?"لا يوجد نتائج":"No results"}</div>`;
  }

  document.getElementById("search").placeholder = lang === "ar" ? "ابحث..." : "Search...";
  document.getElementById("hotTab").innerText = lang === "ar" ? "سخن" : "Hot";
  document.getElementById("coldTab").innerText = lang === "ar" ? "بارد" : "Cold";
  document.body.dir = lang === "ar" ? "rtl" : "ltr";
}

function openModal(item){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalVideo").src = item.video;
  document.getElementById("modalName").innerText = lang==="ar" ? item.name_ar : item.name_en;
  document.getElementById("modalDesc").innerText = lang==="ar" ? item.desc_ar : item.desc_en;
  document.getElementById("modalPrice").innerText = "EGP " + item.price;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
  const v = document.getElementById("modalVideo");
  v.pause();
  v.src = "";
}

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

function toggleLang(){
  lang = lang === "ar" ? "en" : "ar";
  localStorage.setItem("lang", lang);
  render();
}

function toggleFav(i){
  const list = favorites[current];
  if(list.includes(i)){
    favorites[current] = list.filter(x=>x!==i);
  } else {
    favorites[current].push(i);
  }
  localStorage.setItem("fav", JSON.stringify(favorites));
  render();
}

document.getElementById("search").addEventListener("input", render);

document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    current = tab.dataset.type;
    render();
  }
});

render();
</script>

</body>
</html>
